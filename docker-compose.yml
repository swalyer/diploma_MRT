version: '3.9'

services:
  reverse-proxy:
    image: nginx:1.27-alpine
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    networks:
      - edge_net
      - app_net

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    networks:
      - edge_net

  backend:
    build: ./backend
    environment:
      APP_JWT_SECRET: ${APP_JWT_SECRET:-replace-with-long-random-secret-at-least-32-bytes}
      APP_PUBLIC_BASE_URL: ${APP_PUBLIC_BASE_URL:-http://localhost}
      APP_ML_MODE: ${APP_ML_MODE:-mock}
      APP_ML_URL: http://ml-service:8000

      APP_DB_PRIMARY_HOST: ${APP_DB_PRIMARY_HOST:-postgres-primary}
      APP_DB_PRIMARY_PORT: ${APP_DB_PRIMARY_PORT:-5432}
      APP_DB_PRIMARY_NAME: ${APP_DB_PRIMARY_NAME:-mrt}
      APP_DB_PRIMARY_USERNAME: ${APP_DB_PRIMARY_USERNAME:-mrt}
      APP_DB_PRIMARY_PASSWORD: ${APP_DB_PRIMARY_PASSWORD:-mrt}
      SPRING_DATASOURCE_URL: jdbc:postgresql://${APP_DB_PRIMARY_HOST:-postgres-primary}:${APP_DB_PRIMARY_PORT:-5432}/${APP_DB_PRIMARY_NAME:-mrt}
      SPRING_DATASOURCE_USERNAME: ${APP_DB_PRIMARY_USERNAME:-mrt}
      SPRING_DATASOURCE_PASSWORD: ${APP_DB_PRIMARY_PASSWORD:-mrt}

      APP_READ_REPLICA_ENABLED: ${APP_READ_REPLICA_ENABLED:-true}
      APP_DB_REPLICA_HOST: ${APP_DB_REPLICA_HOST:-postgres-replica}
      APP_DB_REPLICA_PORT: ${APP_DB_REPLICA_PORT:-5432}
      APP_DB_REPLICA_NAME: ${APP_DB_REPLICA_NAME:-mrt}
      APP_DB_REPLICA_USERNAME: ${APP_DB_REPLICA_USERNAME:-mrt}
      APP_DB_REPLICA_PASSWORD: ${APP_DB_REPLICA_PASSWORD:-mrt}
      APP_READ_DATASOURCE_URL: jdbc:postgresql://${APP_DB_REPLICA_HOST:-postgres-replica}:${APP_DB_REPLICA_PORT:-5432}/${APP_DB_REPLICA_NAME:-mrt}
      APP_READ_DATASOURCE_USERNAME: ${APP_DB_REPLICA_USERNAME:-mrt}
      APP_READ_DATASOURCE_PASSWORD: ${APP_DB_REPLICA_PASSWORD:-mrt}

      APP_AUDIT_ENABLED: ${APP_AUDIT_ENABLED:-true}
      APP_AUDIT_DB_HOST: ${APP_AUDIT_DB_HOST:-audit-postgres}
      APP_AUDIT_DB_PORT: ${APP_AUDIT_DB_PORT:-5432}
      APP_AUDIT_DB_NAME: ${APP_AUDIT_DB_NAME:-mrt_audit}
      APP_AUDIT_DB_USERNAME: ${APP_AUDIT_DB_USERNAME:-mrt_audit}
      APP_AUDIT_DB_PASSWORD: ${APP_AUDIT_DB_PASSWORD:-mrt_audit}
      APP_AUDIT_DATASOURCE_URL: jdbc:postgresql://${APP_AUDIT_DB_HOST:-audit-postgres}:${APP_AUDIT_DB_PORT:-5432}/${APP_AUDIT_DB_NAME:-mrt_audit}
      APP_AUDIT_DATASOURCE_USERNAME: ${APP_AUDIT_DB_USERNAME:-mrt_audit}
      APP_AUDIT_DATASOURCE_PASSWORD: ${APP_AUDIT_DB_PASSWORD:-mrt_audit}

      APP_STORAGE_ROOT: /data/storage
      APP_STORAGE_ENDPOINT: ${APP_STORAGE_ENDPOINT:-http://minio:9000}
      APP_STORAGE_ACCESS_KEY: ${APP_STORAGE_ACCESS_KEY:-minio}
      APP_STORAGE_SECRET_KEY: ${APP_STORAGE_SECRET_KEY:-minio123}
      APP_STORAGE_BUCKET: ${APP_STORAGE_BUCKET:-mrt-artifacts}

      APP_OBSERVABILITY_ENABLED: ${APP_OBSERVABILITY_ENABLED:-true}
      APP_LOG_LEVEL: ${APP_LOG_LEVEL:-INFO}
    depends_on:
      postgres-primary:
        condition: service_healthy
      postgres-replica:
        condition: service_started
      audit-postgres:
        condition: service_started
      ml-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 30s
    volumes:
      - ./storage:/data/storage
    networks:
      - edge_net
      - app_net
      - data_net
      - obs_net

  ml-service:
    build: ./ml-service
    environment:
      ML_MODE: ${ML_MODE:-mock}
      ML_ARTIFACTS_ROOT: /data/storage
      ML_MODELS_CONFIG_PATH: /app/config/models.real.example.yml
    volumes:
      - ./storage:/data/storage
    networks:
      - app_net
      - data_net
      - obs_net

  postgres-primary:
    image: postgres:16
    environment:
      POSTGRES_DB: ${APP_DB_PRIMARY_NAME:-mrt}
      POSTGRES_USER: ${APP_DB_PRIMARY_USERNAME:-mrt}
      POSTGRES_PASSWORD: ${APP_DB_PRIMARY_PASSWORD:-mrt}
      POSTGRES_REPL_PASSWORD: replicator_pass
    volumes:
      - pg_primary_data:/var/lib/postgresql/data
      - ./deploy/postgres/init-primary-replication.sh:/docker-entrypoint-initdb.d/30-init-replication.sh:ro
      - ./deploy/postgres/postgresql-primary.conf:/etc/postgresql/postgresql.conf:ro
      - ./deploy/postgres/pg_hba-primary.conf:/etc/postgresql/pg_hba.conf:ro
    command: ["postgres", "-c", "config_file=/etc/postgresql/postgresql.conf", "-c", "hba_file=/etc/postgresql/pg_hba.conf"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${APP_DB_PRIMARY_USERNAME:-mrt} -d ${APP_DB_PRIMARY_NAME:-mrt}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks:
      - data_net
      - replication_net
      - obs_net

  postgres-replica:
    image: postgres:16
    environment:
      POSTGRES_USER: ${APP_DB_REPLICA_USERNAME:-mrt}
      POSTGRES_PASSWORD: ${APP_DB_REPLICA_PASSWORD:-mrt}
      PGDATA: /var/lib/postgresql/data
      PRIMARY_HOST: postgres-primary
      REPLICATION_USER: replicator
      REPLICATION_PASSWORD: replicator_pass
    depends_on:
      - postgres-primary
    entrypoint: ["/bin/bash", "/docker-entrypoint-initdb.d/replica-entrypoint.sh"]
    volumes:
      - pg_replica_data:/var/lib/postgresql/data
      - ./deploy/postgres/replica-entrypoint.sh:/docker-entrypoint-initdb.d/replica-entrypoint.sh:ro
    networks:
      - data_net
      - replication_net
      - obs_net

  audit-postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${APP_AUDIT_DB_NAME:-mrt_audit}
      POSTGRES_USER: ${APP_AUDIT_DB_USERNAME:-mrt_audit}
      POSTGRES_PASSWORD: ${APP_AUDIT_DB_PASSWORD:-mrt_audit}
    volumes:
      - audit_pg_data:/var/lib/postgresql/data
      - ./deploy/postgres/init-audit-db.sql:/docker-entrypoint-initdb.d/10-init-audit.sql:ro
    networks:
      - data_net
      - replication_net
      - obs_net

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${APP_STORAGE_ACCESS_KEY:-minio}
      MINIO_ROOT_PASSWORD: ${APP_STORAGE_SECRET_KEY:-minio123}
    volumes:
      - minio_data:/data
    ports:
      - "9001:9001"
    networks:
      - data_net

networks:
  edge_net:
  app_net:
  data_net:
  replication_net:
  obs_net:

volumes:
  pg_primary_data:
  pg_replica_data:
  audit_pg_data:
  minio_data:
