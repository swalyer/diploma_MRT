version: '3.9'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: mrt
      POSTGRES_USER: mrt
      POSTGRES_PASSWORD: mrt
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio:/data
  backend:
    build: ./backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/mrt
      SPRING_DATASOURCE_USERNAME: mrt
      SPRING_DATASOURCE_PASSWORD: mrt
      APP_JWT_SECRET: dev-secret
      APP_ML_URL: http://ml-service:8000
      APP_STORAGE_ROOT: /data/storage
      APP_ML_MODE: ${APP_ML_MODE:mock}
    depends_on:
      - postgres
      - ml-service
    ports:
      - "8080:8080"
    volumes:
      - ./storage:/data/storage
  ml-service:
    build: ./ml-service
    environment:
      ML_MODE: ${ML_MODE:mock}
      ML_ARTIFACTS_ROOT: /data/storage
      ML_MODELS_CONFIG_PATH: /app/config/models.real.example.yml
    volumes:
      - ./storage:/data/storage
    ports:
      - "8000:8000"
  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"
volumes:
  pgdata:
  minio:
