version: '3.9'
services:
  reverse-proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - edge_net
      - app_net

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    restart: unless-stopped
    networks:
      - edge_net

networks:
  edge_net:
    driver: bridge
  app_net:
    external: true
    name: app_net
